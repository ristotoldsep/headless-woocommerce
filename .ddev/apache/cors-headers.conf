# CORS headers for headless WooCommerce + Astro frontend
# Allows requests from localhost (Astro dev server) and serum-shop.ddev.site
# Required for WooCommerce Store API v1 cart operations (Cart-Token auth)

<IfModule mod_headers.c>
    SetEnvIfNoCase Origin "^https?://(localhost(:[0-9]+)?|serum-shop\.ddev\.site)$" CORS_ORIGIN=$0
    Header always set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Nonce, Cart-Token, X-WC-Store-API-Nonce"
    Header always set Access-Control-Expose-Headers "Cart-Token, Nonce, X-WC-Store-API-Nonce"
</IfModule>

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule .* - [R=200,L]
</IfModule>
